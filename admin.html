<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Railway Reservation - Admin Panel</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🚆</span>
        <span class="logo-text">RailReserve</span>
      </div>
      <nav>
        <a href="/" class="nav-link">Book Ticket</a>
        <a href="/admin" class="nav-link active">Admin Panel</a>
      </nav>
    </div>
  </header>

  <main class="container">

    <section class="hero">
      <h1 class="hero-title">Admin Panel</h1>
      <p class="hero-sub">Manage trains and reservations.</p>
    </section>

    <!-- Add New Train -->
    <section class="card">
      <h2 class="card-title"><span class="card-icon">🚂</span> Add New Train</h2>

      <form id="addTrainForm">
        <div class="form-grid">
          <div class="form-group">
            <label>Train Number</label>
            <input type="text" id="train_number" placeholder="e.g. 12345" required />
          </div>
          <div class="form-group">
            <label>Train Name</label>
            <input type="text" id="train_name" placeholder="e.g. Rajdhani Express" required />
          </div>
          <div class="form-group">
            <label>Source Station</label>
            <input type="text" id="source" placeholder="e.g. Pune" required />
          </div>
          <div class="form-group">
            <label>Destination Station</label>
            <input type="text" id="destination" placeholder="e.g. Delhi" required />
          </div>
          <div class="form-group">
            <label>Departure Time</label>
            <input type="time" id="departure_time" required />
          </div>
          <div class="form-group">
            <label>Arrival Time</label>
            <input type="time" id="arrival_time" required />
          </div>
          <div class="form-group">
            <label>Total Seats</label>
            <input type="number" id="total_seats" placeholder="e.g. 200" min="1" required />
          </div>
          <div class="form-group">
            <label>Fare (₹)</label>
            <input type="number" id="fare" placeholder="e.g. 450" min="1" step="0.01" required />
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Add Train →</button>
      </form>

      <div id="trainMsg" class="message hidden"></div>
    </section>

    <!-- All Bookings Table -->
    <section class="card">
      <h2 class="card-title"><span class="card-icon">📊</span> All Bookings</h2>
      <p class="card-sub">Live data from the <code>booking_summary</code> VIEW.</p>

      <button class="btn btn-secondary" onclick="loadAllBookings()" style="margin-bottom: 1rem;">
        🔄 Refresh Bookings
      </button>

      <div id="allBookingsTable" class="table-wrap hidden">
        <table>
          <thead>
            <tr>
              <th>Ticket #</th>
              <th>Passenger</th>
              <th>Contact</th>
              <th>Train</th>
              <th>Route</th>
              <th>Date</th>
              <th>Seat</th>
              <th>Fare</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="allBookingsTbody"></tbody>
        </table>
      </div>
      <div id="allBookingsMsg" class="message hidden"></div>
    </section>

  </main>

  <footer class="site-footer">
    <p>SPPU DBMS Mini Project &mdash; Railway Reservation System &copy; 2025</p>
  </footer>

  <script>
    // Add new train form submission
    document.getElementById('addTrainForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const msgEl = document.getElementById('trainMsg');
      msgEl.className = 'message hidden';

      const payload = {
        train_number:   document.getElementById('train_number').value.trim(),
        train_name:     document.getElementById('train_name').value.trim(),
        source:         document.getElementById('source').value.trim(),
        destination:    document.getElementById('destination').value.trim(),
        departure_time: document.getElementById('departure_time').value,
        arrival_time:   document.getElementById('arrival_time').value,
        total_seats:    parseInt(document.getElementById('total_seats').value),
        fare:           parseFloat(document.getElementById('fare').value),
      };

      const res = await fetch('/api/admin/trains', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (res.ok) {
        msgEl.className = 'message success';
        msgEl.textContent = `✅ ${data.message}`;
        this.reset();
      } else {
        msgEl.className = 'message error';
        msgEl.textContent = `❌ ${data.detail}`;
      }
      msgEl.classList.remove('hidden');
    });

    // Load all bookings from the VIEW via admin API
    async function loadAllBookings() {
      const tableEl = document.getElementById('allBookingsTable');
      const msgEl   = document.getElementById('allBookingsMsg');
      tableEl.classList.add('hidden');
      msgEl.classList.add('hidden');

      const res  = await fetch('/api/admin/bookings');
      const data = await res.json();

      if (!res.ok) {
        msgEl.className = 'message error';
        msgEl.textContent = data.detail;
        msgEl.classList.remove('hidden');
        return;
      }

      if (data.length === 0) {
        msgEl.className = 'message info';
        msgEl.textContent = 'No bookings in the system yet.';
        msgEl.classList.remove('hidden');
        return;
      }

      const tbody = document.getElementById('allBookingsTbody');
      tbody.innerHTML = '';
      data.forEach(b => {
        const tr = document.createElement('tr');
        const statusClass = b.status === 'Confirmed' ? 'badge-confirmed' : 'badge-cancelled';
        const cancelBtn = b.status === 'Confirmed'
          ? `<button class="btn btn-danger btn-sm" onclick="cancelTicket(${b.ticket_id})">Cancel</button>`
          : `<span class="muted">—</span>`;
        tr.innerHTML = `
          <td><strong>#${b.ticket_id}</strong></td>
          <td>${b.passenger_name}</td>
          <td><small>${b.passenger_email}<br/>${b.passenger_phone}</small></td>
          <td>${b.train_number}<br/><small>${b.train_name}</small></td>
          <td>${b.source} → ${b.destination}</td>
          <td>${b.journey_date}</td>
          <td>${b.seat_number}</td>
          <td>₹${b.fare}</td>
          <td><span class="badge ${statusClass}">${b.status}</span></td>
          <td>${cancelBtn}</td>
        `;
        tbody.appendChild(tr);
      });
      tableEl.classList.remove('hidden');
    }

    // Cancel a ticket by ID
    async function cancelTicket(ticketId) {
      if (!confirm(`Cancel Ticket #${ticketId}? This will restore the seat.`)) return;

      const res  = await fetch(`/api/admin/tickets/${ticketId}`, { method: 'DELETE' });
      const data = await res.json();

      if (res.ok) {
        alert(`✅ ${data.message}`);
        loadAllBookings(); // Refresh the table
      } else {
        alert(`❌ ${data.detail}`);
      }
    }

    // Auto-load bookings on page open
    loadAllBookings();
  </script>
</body>
</html>
